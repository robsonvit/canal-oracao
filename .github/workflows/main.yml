name: 🙏 Gerar Oração Diária

on:
  schedule:
    - cron: '0 9 * * *'  # 06:00 BRT (09:00 UTC) todos os dias
  workflow_dispatch:       # Permite execução manual pelo painel do GitHub

permissions:
  contents: write          # Necessário para fazer commit do tracking de vídeos

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

jobs:
  gerar-oracao:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Instalar FFmpeg e fontes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-extra \
            fonts-liberation \
            fonts-freefont-ttf

      - name: 📦 Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 📁 Criar diretórios necessários
        run: |
          mkdir -p output data assets/fonts

      - name: 🙏 Executar pipeline de oração
        run: python scripts/pipeline.py

      - name: 📊 Verificar arquivos gerados
        run: |
          echo "📁 Arquivos na pasta output:"
          ls -lh output/ 2>/dev/null || echo "(vazia)"
          echo ""
          echo "📋 Tracking de vídeos usados:"
          cat data/videos_usados.json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          print(f'Total de vídeos registrados: {len(data)}')
          " || echo "(arquivo não encontrado)"

      - name: 💾 Salvar tracking de vídeos no repositório
        run: |
          git config user.name "Canal Oração Bot"
          git config user.email "bot@canal-oracao.com"
          git add data/videos_usados.json
          git diff --staged --quiet || git commit -m "🎬 Atualiza tracking de vídeos usados [skip ci]"
          git push

      - name: 📤 Upload de artefatos (backup por 7 dias)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oracao-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/video_final.mp4
            output/thumbnail.jpg
            output/oracao.json
          retention-days: 7
